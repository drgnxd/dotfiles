name: Darwin

on:
  push:
    paths:
      - flake.nix
      - flake.lock
      - hosts/**
      - home/**
      - nix/**
      - .github/workflows/darwin.yml
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      darwin: ${{ steps.filter.outputs.darwin }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "darwin=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if echo "$files" | grep -Eq '^(flake\.nix|flake\.lock|hosts/|home/|nix/|\.github/workflows/darwin\.yml)'; then
            echo "darwin=true" >> "$GITHUB_OUTPUT"
          else
            echo "darwin=false" >> "$GITHUB_OUTPUT"
          fi

  build-darwin-system:
    needs: changes
    if: needs.changes.outputs.darwin == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-darwin-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-darwin-${{ runner.os }}-
          save: true
      - name: Build darwin system
        run: |
          darwin_names_json=$(nix eval --json --no-write-lock-file \
            .#darwinConfigurations --apply 'builtins.attrNames' 2>/dev/null || echo '["darwin"]')
          darwin_name=$(python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[0] if data else "darwin")' <<< "$darwin_names_json")
          nix build .#darwinConfigurations."$darwin_name".system --no-link --no-write-lock-file

  darwin-gate:
    needs: [changes, build-darwin-system]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate darwin build result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BUILD_RESULT: ${{ needs.build-darwin-system.result }}
        run: |
          set -euo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job did not succeed (result=$CHANGES_RESULT); failing closed" >&2
            exit 1
          fi
          case "$BUILD_RESULT" in
            success|skipped) echo "darwin gate ok (build=$BUILD_RESULT)" ;;
            *) echo "darwin build gate failed (build=$BUILD_RESULT)" >&2; exit 1 ;;
          esac
