name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-nushell:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nushell
        run: brew install nushell
      - name: Symlink nushell config to XDG location
        run: |
          cp "$GITHUB_WORKSPACE/dot_config/nushell/local.nu.example" "$GITHUB_WORKSPACE/dot_config/nushell/local.nu"
          mkdir -p "$HOME/.config"
          ln -s "$GITHUB_WORKSPACE/dot_config/nushell" "$HOME/.config/nushell"
      - name: Prepare Nushell cache
        run: |
          # Plan A: runtime cache for carapace
          mkdir -p "$HOME/.cache/nushell-init"
          touch "$HOME/.cache/nushell-init/carapace.nu"
          # Plan B: Nix-generated stubs (in prod these are derivation outputs)
          # NOTE: must run AFTER symlink so mkdir goes through the symlink into the repo dir
          mkdir -p "$HOME/.config/nushell/generated"
          touch "$HOME/.config/nushell/generated/starship.nu"
          touch "$HOME/.config/nushell/generated/zoxide.nu"
          touch "$HOME/.config/nushell/generated/atuin.nu"
      - name: Source autoload modules
        run: |
          nu --env-config dot_config/nushell/env.nu --config dot_config/nushell/config.nu -c 'version'
      - name: Check Nushell file syntax
        run: |
          if nu --help 2>&1 | grep -q -- '--check'; then
            mode="check"
          elif nu --help 2>&1 | grep -q -- '--ide-check <int>'; then
            mode="ide-check"
          else
            echo "No syntax check flag available, skipping"
            exit 0
          fi

          if [ "$mode" = "check" ]; then
            for f in dot_config/nushell/autoload/*.nu \
                     dot_config/nushell/modules/*.nu \
                     dot_config/nushell/env.nu \
                     dot_config/nushell/config.nu; do
              echo "Checking: $f"
              nu --check "$f" || exit 1
            done
          else
            for f in dot_config/nushell/autoload/*.nu \
                     dot_config/nushell/modules/*.nu \
                     dot_config/nushell/env.nu \
                     dot_config/nushell/config.nu; do
              echo "Checking: $f"
              output=$(nu --ide-check 1000 "$f" 2>&1)
              if [ -n "$output" ]; then
                echo "$output"
              fi
              if echo "$output" | grep -q '"severity":"Error"'; then
                echo "Syntax diagnostics reported for: $f" >&2
                exit 1
              fi
            done
          fi
      - name: Verify XDG dirs
        run: |
          nu --env-config dot_config/nushell/env.nu --config dot_config/nushell/config.nu -c 'xdg-dirs | to json'

  validate-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Validate OpenCode rules, instructions, and skills
        run: |
          uv run --directory dot_config/opencode python validate_opencode_setup.py

  validate-nix-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Validate Nix evaluation
        run: |
          nix eval --no-write-lock-file .#darwinConfigurations.macbook.config.system.stateVersion
          nix eval --no-write-lock-file .#darwinConfigurations.macbook.config.home-manager.users.drgnxd.home.stateVersion
          nix eval --no-write-lock-file .#darwinConfigurations.macbook.config.home-manager.users.drgnxd.home.activationPackage.drvPath
          nix flake check --no-build --no-write-lock-file

  test-home-manager-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Detect home configuration name
        id: detect
        run: |
          names_json=$(nix eval --json --no-write-lock-file \
            .#homeConfigurations --apply 'builtins.attrNames' 2>/dev/null || echo '["drgnxd@linux-dev"]')
          name=$(python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[0] if data else "drgnxd@linux-dev")' <<< "$names_json")
          echo "name=$name" >> "$GITHUB_OUTPUT"
      - name: Build Linux home-manager configuration
        run: |
          nix build .#homeConfigurations."${{ steps.detect.outputs.name }}".activationPackage --no-link --no-write-lock-file
      - name: Verify activation package drv path
        run: |
          name="${{ steps.detect.outputs.name }}"
          drv=$(nix eval --raw --no-write-lock-file \
            .#homeConfigurations."$name".activationPackage.drvPath)
          if [ -z "$drv" ]; then
            echo "ERROR: activationPackage.drvPath is empty" >&2
            exit 1
          fi
          echo "home configuration: $name"
          echo "activationPackage.drvPath: $drv"

  validate-linux-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate desktop config files
        run: |
          for f in dot_config/hypr/hyprland.conf \
                   dot_config/hypr/hyprlock.conf \
                   dot_config/hypr/hypridle.conf \
                   dot_config/waybar/config.jsonc \
                   dot_config/waybar/style.css \
                   dot_config/wofi/config \
                   dot_config/wofi/style.css \
                   dot_config/mako/config; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f" >&2
              exit 1
            fi
          done
          echo "All Linux desktop config files present"
      - name: Validate Waybar JSON
        run: |
          sed 's|//.*||' dot_config/waybar/config.jsonc | python3 -c "import json,sys; json.load(sys.stdin)"
      # shellcheck for scripts/linux/hypr-* is handled in lint.yml

  lint-nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Run Nix lint checks
        run: |
          nix build .#checks.x86_64-linux.formatting --no-link
          nix build .#checks.x86_64-linux.lint-statix --no-link
          nix build .#checks.x86_64-linux.lint-deadnix --no-link

  doc-pair-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check EN/JA doc pairs exist
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          pairs = [
              ("docs/ARCHITECTURE.md", "docs/ARCHITECTURE.ja.md"),
              ("docs/architecture/nushell.md", "docs/architecture/nushell.ja.md"),
              ("docs/architecture/platform-support.md", "docs/architecture/platform-support.ja.md"),
              ("docs/architecture/security-model.md", "docs/architecture/security-model.ja.md"),
              ("docs/architecture/taskwarrior.md", "docs/architecture/taskwarrior.ja.md"),
              ("docs/architecture/workflow.md", "docs/architecture/workflow.ja.md"),
              ("docs/architecture/troubleshooting.md", "docs/architecture/troubleshooting.ja.md"),
              ("docs/architecture/xdg-compliance.md", "docs/architecture/xdg-compliance.ja.md"),
              ("docs/scripts/README.darwin.md", "docs/scripts/README.darwin.ja.md"),
              ("README.md", "docs/README.ja.md"),
          ]

          errors = []
          for en, ja in pairs:
              en_exists = Path(en).exists()
              ja_exists = Path(ja).exists()
              if en_exists and not ja_exists:
                  errors.append(f"Missing JA: {ja} (EN exists: {en})")
              elif ja_exists and not en_exists:
                  errors.append(f"Missing EN: {en} (JA exists: {ja})")

          benchmark_dir = Path("docs/benchmarks")
          benchmark_name = re.compile(r"^\d{4}-\d{2}-\d{2}(?:-[a-z0-9-]+)?\.md$")
          if benchmark_dir.exists():
              for report in benchmark_dir.glob("*.md"):
                  if report.name == "README.md":
                      continue
                  if not benchmark_name.match(report.name):
                      errors.append(
                          "Invalid benchmark filename: "
                          f"{report} (expected YYYY-MM-DD.md or YYYY-MM-DD-<slug>.md)"
                      )

          if errors:
              for e in errors:
                  print(f"WARNING: {e}", file=sys.stderr)
          print(f"Doc pair check: {len(pairs)} pairs, {len(errors)} mismatches")
          PY

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Scan for secrets drift
        run: |
          uv tool run detect-secrets scan --baseline .secrets.baseline
          uv run --directory . python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          def load(path: str):
              return json.loads(Path(path).read_text())

          def load_committed(path: str):
              data = subprocess.check_output(["git", "show", f"HEAD:{path}"], text=True)
              return json.loads(data)

          def normalize(data: dict):
              data.pop("generated_at", None)
              return data

          current = normalize(load(".secrets.baseline"))
          committed = normalize(load_committed(".secrets.baseline"))

          if current != committed:
              print(
                  "detect-secrets baseline drift detected. "
                  "Run: uv tool run detect-secrets scan --baseline .secrets.baseline",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Validate YAML and TOML syntax
        run: |
          uv run --with pyyaml --directory . python - <<'PY'
          from pathlib import Path
          import sys
          import tomllib
          import yaml

          def should_skip(path: Path) -> bool:
              parts = path.parts
              return ".venv" in parts or ".git" in parts

          errors = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if should_skip(path):
                  continue
              if path.suffix in {".yaml", ".yml"}:
                  try:
                      yaml.safe_load(path.read_text(encoding="utf-8"))
                  except Exception as exc:
                      errors.append(f"YAML: {path}: {exc}")
              elif path.suffix == ".toml":
                  try:
                      tomllib.loads(path.read_text(encoding="utf-8"))
                  except Exception as exc:
                      errors.append(f"TOML: {path}: {exc}")

          if errors:
              print("\n".join(errors), file=sys.stderr)
              raise SystemExit(1)
          print("YAML/TOML validation passed")
          PY
  test-taskwarrior:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Run Taskwarrior hook tests
        run: |
          uv run --with pytest --directory dot_config/taskwarrior/hooks pytest
