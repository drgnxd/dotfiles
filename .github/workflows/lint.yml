name: Lint Scripts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run ShellCheck
        run: |
          shellcheck --version
          if [ -z "$(git ls-files '*.sh')" ]; then
            echo "No shell scripts found"
            exit 0
          fi
          git ls-files -z '*.sh' | xargs -0 -r shellcheck
      - name: ShellCheck extensionless scripts
        run: |
          if [ -d scripts/linux ]; then
            shellcheck scripts/linux/hypr-*
          fi
      - name: Install shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt

      - name: Check shell formatting with shfmt
        run: |
          echo "Running shfmt format check..."
          if [ -z "$(git ls-files '*.sh')" ]; then
            echo "No shell scripts found"
            exit 0
          fi
          git ls-files -z '*.sh' | xargs -0 -r shfmt -l | tee /tmp/shfmt_unformatted || true
          if [ -s /tmp/shfmt_unformatted ]; then
            echo "shfmt detected unformatted files:" >&2
            cat /tmp/shfmt_unformatted >&2
            echo "Run: shfmt -w <files> to format them" >&2
            exit 1
          fi

      - name: Check Floorp shared-layer parity drift
        continue-on-error: true
        run: scripts/check-floorp-parity.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run ruff
        run: |
          uv tool run ruff check dot_config/taskwarrior/hooks dot_config/opencode

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install actionlint
        run: |
          version="1.7.12"
          archive="actionlint_${version}_linux_amd64.tar.gz"
          expected_sha256="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSL -o "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          actual_sha256="$(sha256sum "$archive" | cut -d ' ' -f 1)"
          if [ "$actual_sha256" != "$expected_sha256" ]; then
            echo "actionlint checksum mismatch: $actual_sha256" >&2
            exit 1
          fi
          tar -xzf "$archive" actionlint
      - name: Run actionlint
        run: ./actionlint -color

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          config: .typos.toml
