name: Lint Scripts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run ShellCheck
        run: |
          shellcheck --version
          if [ -z "$(git ls-files '*.sh')" ]; then
            echo "No shell scripts found"
            exit 0
          fi
          git ls-files -z '*.sh' | xargs -0 -r shellcheck
      - name: ShellCheck extensionless scripts
        run: |
          if [ -d scripts/linux ]; then
            shellcheck scripts/linux/hypr-*
          fi

      - name: Check Floorp shared-layer parity drift
        continue-on-error: true
        run: scripts/check-floorp-parity.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run ruff
        run: |
          uv tool run ruff check dot_config/taskwarrior/hooks dot_config/opencode

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: Run actionlint
        run: nix run --inputs-from . nixpkgs#actionlint -- -color

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          config: .typos.toml
