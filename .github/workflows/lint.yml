name: Lint Scripts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run ShellCheck
        run: |
          shellcheck --version
          if [ -z "$(git ls-files '*.sh')" ]; then
            echo "No shell scripts found"
            exit 0
          fi
          git ls-files -z '*.sh' | xargs -0 -r shellcheck
      - name: ShellCheck extensionless scripts
        run: |
          if [ -d scripts/linux ]; then
            shellcheck scripts/linux/hypr-*
          fi

      - name: Check Floorp shared-layer parity drift
        continue-on-error: true
        run: scripts/check-floorp-parity.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Run ruff
        run: |
          uv tool run ruff check dot_config/taskwarrior/hooks dot_config/opencode

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - name: Run actionlint
        run: nix run --inputs-from . nixpkgs#actionlint -- -color

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          config: .typos.toml
