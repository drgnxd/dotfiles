repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: validate-opencode-setup
        name: Validate OpenCode minimal setup
        entry: uv run --directory dot_config/opencode python validate_opencode_setup.py
        language: system
        files: ^dot_config/opencode/(AGENTS\.md|dcp\.json|opencode\.json|opencode\.local\.json\.example|package\.json|validate_opencode_setup\.py|tools/.*\.(ts|js)|skills/.*\.yaml|skills/.*/(SKILL\.md)|command/.*\.md)$
