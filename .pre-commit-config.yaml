repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: block-flake-local-nix
        name: Block flake.local.nix commits
        entry: bash scripts/block_flake_local_nix.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: validate-opencode-setup
        name: Validate OpenCode minimal setup
        entry: uv run --directory dot_config/opencode python validate_opencode_setup.py
        language: system
        files: ^dot_config/opencode/(AGENTS\.md|opencode\.json|opencode\.local\.json\.example|package\.json|validate_opencode_setup\.py|tools/.*\.(ts|js)|skills/.*\.yaml|skills/.*/(SKILL\.md)|command/.*\.md)$
      - id: nixfmt
        name: nixfmt
        entry: nix run nixpkgs#nixfmt-rfc-style --
        language: system
        files: \.nix$
      - id: statix
        name: statix
        entry: nix run nixpkgs#statix -- check
        language: system
        pass_filenames: false
        files: \.nix$
      - id: deadnix
        name: deadnix
        entry: nix run nixpkgs#deadnix -- --fail
        language: system
        pass_filenames: false
        files: \.nix$
      - id: shfmt
        name: shfmt
        entry: nix run nixpkgs#shfmt -- -d
        language: system
        files: \.sh$
