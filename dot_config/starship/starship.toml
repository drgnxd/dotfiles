"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "solarized_dark"

# Explicit timeouts (previously implicit defaults). Starship kills any
# module command exceeding command_timeout, which silently hides broken
# modules; making the budget explicit keeps that behavior auditable.
command_timeout = 500
scan_timeout = 30

# Left prompt: "where am I / what state am I in" ŌĆö modules whose absence
# can cause accidents (wrong host, wrong branch, wrong environment).
# Language/version modules are intentionally absent: toolchains are
# pinned by the flake, so the safety signal is "is the dev shell active"
# (nix_shell / direnv), not a version number.
format = """
[](base02)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nix_shell\
$direnv\
${env_var.VIRTUAL_ENV_PROMPT}\
${env_var.PASS_AGENT_DOWN}\
[](base02)\
$line_break\
$character"""

# Right prompt: "what just happened" ŌĆö off the typing path.
right_format = """$status$cmd_duration$jobs"""

[palettes.solarized_dark]
base03 = "#002b36"
base02 = "#073642"
base01 = "#586e75"
base00 = "#657b83"
base0 = "#839496"
base1 = "#93a1a1"
base2 = "#eee8d5"
base3 = "#fdf6e3"
yellow = "#b58900"
orange = "#cb4b16"
red = "#dc322f"
magenta = "#d33682"
violet = "#6c71c4"
blue = "#268bd2"
cyan = "#2aa198"
green = "#859900"

[os]
disabled = false
style = "bg:base02 fg:base1"
format = "[$symbol]($style)"

[os.symbols]
Macos = "¾░ĆĄ "
Linux = "¾░īĮ "
Ubuntu = "¾░īĮ "

# Renders only for root or over SSH (show_always = false default behavior).
[username]
show_always = false
style_user = "bg:base02 fg:yellow"
style_root = "bg:base02 fg:red"
format = "[$user]($style)"

# Renders only over SSH ŌĆö guards against running commands on the wrong host.
[hostname]
ssh_only = true
ssh_symbol = "¾░ŻĆ "
style = "bg:base02 fg:yellow"
format = "[@$hostname $ssh_symbol]($style)"

[directory]
style = "bg:base02 fg:blue"
format = "[ $path ]($style)[$read_only]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
read_only = " ¾░īŠ"

[git_branch]
symbol = ""
style = "bg:base02 fg:violet"
format = "[[ $symbol $branch ](bg:base02 fg:violet)]($style)"

[git_status]
disabled = false
style = "bg:base02 fg:orange"
format = "[$all_status$ahead_behind]($style)"
conflicted = "="
ahead = "ŌćĪ"
behind = "ŌćŻ"
diverged = "ŌćĢ"
up_to_date = ""
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "Ō£ś"

[nix_shell]
symbol = " "
style = "bg:base02 fg:blue"
format = "[ | $symbol$state]($style)"

[direnv]
disabled = false
symbol = "Ō¢╝ "
style = "bg:base02 fg:orange"
format = "[ | $symbol$allowed]($style)"

# Zero-subprocess replacement for the removed [custom.venv] (which spawned
# `nu` on every prompt). VIRTUAL_ENV_PROMPT is set by uv and modern venv
# activate scripts; if a venv tool does not set it, nothing renders
# (fail-quiet). Fallback if needed later: switch variable to VIRTUAL_ENV
# (renders the full path).
[env_var.VIRTUAL_ENV_PROMPT]
symbol = " "
style = "bg:base02 fg:cyan"
format = "[ | $symbol$env_value]($style)"

# Anomaly-only indicator: set by a Nushell pre_prompt hook when the SSH
# agent socket is missing (Proton Pass ssh-agent workflow). Silent when
# healthy, red when broken ŌĆö catches failed/wrong-key git SSH signing
# before it happens.
[env_var.PASS_AGENT_DOWN]
symbol = "¾░īå "
style = "bg:base02 fg:red"
format = "[ | $symbol$env_value]($style)"

[status]
disabled = false
symbol = "Ō£ś "
style = "fg:red"
format = "[$symbol$status]($style) "

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = "[¾░×ī $duration]($style) "

[jobs]
symbol = " "
symbol_threshold = 1
number_threshold = 1
style = "fg:base1"
format = "[$symbol$number]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"
vimcmd_symbol = "[ŌØ«](bold blue)"
