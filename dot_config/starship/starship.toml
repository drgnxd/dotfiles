"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "solarized_dark"

# Explicit timeouts (previously implicit defaults). Starship kills any
# module command exceeding command_timeout, which silently hides broken
# modules; making the budget explicit keeps that behavior auditable.
command_timeout = 500
scan_timeout = 30

# Left prompt: "where am I / what state am I in" â€” modules whose absence
# can cause accidents (wrong host, wrong branch, wrong environment).
# Language/version modules are intentionally absent: toolchains are
# pinned by the flake, so the safety signal is "is the dev shell active"
# (nix_shell / direnv), not a version number.
# One quiet base02 Neutral Rail uses rounded outer caps. Blue location,
# green VCS, and cyan environment foregrounds share the carrier; orange
# dirty-state and red anomaly chips appear only when active.
format = """
[î‚¶](fg:base02)\
$os\
$username\
$hostname\
$directory\
$git_branch\
([î‚°](fg:base02 bg:orange)[ ](bg:orange)$git_status[î‚° ](fg:orange bg:base02))\
$nix_shell\
${env_var.DIRENV_DIR}\
${env_var.VIRTUAL_ENV_PROMPT}\
([î‚°](fg:base02 bg:red)[ ](bg:red)${env_var.DIRENV_BLOCKED}${env_var.PASS_AGENT_DOWN}[î‚° ](fg:red bg:base02))\
[î‚´ ](fg:base02)\
$line_break\
$character"""

# Right prompt: "what just happened" â€” off the typing path.
right_format = """$status$cmd_duration$jobs"""

[palettes.solarized_dark]
base03 = "#002b36"
base02 = "#073642"
base01 = "#586e75"
base00 = "#657b83"
base0 = "#839496"
base1 = "#93a1a1"
base2 = "#eee8d5"
base3 = "#fdf6e3"
yellow = "#b58900"
orange = "#cb4b16"
red = "#dc322f"
magenta = "#d33682"
violet = "#6c71c4"
blue = "#268bd2"
cyan = "#2aa198"
green = "#859900"

[os]
disabled = false
style = "fg:base1 bg:base02"
format = "[$symbol]($style)"

[os.symbols]
Macos = "َ°€µ "
Linux = "َ°Œ½ "
Ubuntu = "َ°Œ½ "

# Renders only for root or over SSH (show_always = false default behavior).
[username]
show_always = false
style_user = "bold fg:yellow bg:base02"
style_root = "bold fg:red bg:base02"
format = "[$user ]($style)"

# Renders only over SSH â€” guards against running commands on the wrong host.
[hostname]
ssh_only = true
ssh_symbol = "َ°£€ "
style = "bold fg:yellow bg:base02"
format = "[@$hostname $ssh_symbol]($style)"

[directory]
style = "bold fg:blue bg:base02"
format = "[$path$read_only ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"
read_only = " َ°Œ¾"

[git_branch]
symbol = ""
style = "fg:green bg:base02"
format = "[$symbol$branch ]($style)"

[git_status]
disabled = false
style = "bold fg:base3 bg:orange"
format = "([$all_status$ahead_behind ]($style))"
conflicted = "="
ahead = "â‡،"
behind = "â‡£"
diverged = "â‡•"
up_to_date = ""
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "آ»"
deleted = "âœک"

[nix_shell]
symbol = "ïŒ“ "
style = "fg:cyan bg:base02"
format = "[$symbol$state ]($style)"

# The built-in [direnv] module cost 72ms per prompt and duplicated the
# direnv invocation already performed by the Nushell PWD hook.
[env_var.DIRENV_DIR]
symbol = "â–¼ "
style = "fg:cyan bg:base02"
format = "[$symbol]($style)"

[env_var.DIRENV_BLOCKED]
symbol = "â–¼ "
style = "bold fg:base3 bg:red"
format = "[$symbol$env_value ]($style)"

# Zero-subprocess replacement for the removed [custom.venv] (which spawned
# `nu` on every prompt). VIRTUAL_ENV_PROMPT is set by uv and modern venv
# activate scripts; if a venv tool does not set it, nothing renders
# (fail-quiet). Fallback if needed later: switch variable to VIRTUAL_ENV
# (renders the full path).
[env_var.VIRTUAL_ENV_PROMPT]
symbol = "îœ¼ "
style = "fg:cyan bg:base02"
format = "[$symbol$env_value ]($style)"

# Anomaly-only indicator: set by a Nushell pre_prompt hook when the SSH
# agent socket is missing (Proton Pass ssh-agent workflow). Silent when
# healthy, red when broken â€” catches failed/wrong-key git SSH signing
# before it happens.
[env_var.PASS_AGENT_DOWN]
symbol = "َ°Œ† "
style = "bold fg:base3 bg:red"
format = "[$symbol$env_value ]($style)"

[status]
disabled = false
symbol = "âœک "
style = "fg:red"
format = "[$symbol$status]($style) "

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = "[َ°‍Œ $duration]($style) "

[jobs]
symbol = " "
symbol_threshold = 1
number_threshold = 1
style = "fg:base1"
format = "[$symbol$number]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[â‌¯](bold green)"
error_symbol = "[â‌¯](bold red)"
vimcmd_symbol = "[â‌®](bold blue)"
