# Monitor — auto-detect, no scaling
monitor = , preferred, auto, 1

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(268bd2)
    col.inactive_border = rgb(073642)
    layout = dwindle
}

decoration {
    rounding = 6
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(002b36cc)
    }
}

animations {
    enabled = true
    bezier = snappy, 0.25, 1, 0.5, 1
    animation = windows, 1, 4, snappy
    animation = windowsOut, 1, 4, snappy, popin 80%
    animation = fade, 1, 3, snappy
    animation = workspaces, 1, 4, snappy, slide
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# === App launcher (Sol equivalent) ===
bind = SUPER, Space, exec, wofi --show drun

# === Terminal ===
bind = SUPER, Return, exec, alacritty

# === Window management (Ctrl+Alt — Hammerspoon parity) ===
# Half screen
bind = CTRL ALT, left, exec, hyprctl --batch "dispatch resizeactive exact 50% 100%; dispatch moveactive exact 0 0"
bind = CTRL ALT, right, exec, hyprctl --batch "dispatch resizeactive exact 50% 100%; dispatch moveactive exact 50% 0"
bind = CTRL ALT, up, exec, hyprctl --batch "dispatch resizeactive exact 100% 50%; dispatch moveactive exact 0 0"
bind = CTRL ALT, down, exec, hyprctl --batch "dispatch resizeactive exact 100% 50%; dispatch moveactive exact 0 50%"

# Maximize
bind = CTRL ALT, Return, fullscreen, 1

# Quarter screen
bind = CTRL ALT, u, exec, hyprctl --batch "dispatch resizeactive exact 50% 50%; dispatch moveactive exact 0 0"
bind = CTRL ALT, i, exec, hyprctl --batch "dispatch resizeactive exact 50% 50%; dispatch moveactive exact 50% 0"
bind = CTRL ALT, j, exec, hyprctl --batch "dispatch resizeactive exact 50% 50%; dispatch moveactive exact 0 50%"
bind = CTRL ALT, k, exec, hyprctl --batch "dispatch resizeactive exact 50% 50%; dispatch moveactive exact 50% 50%"

# Center 80%
bind = CTRL ALT, c, exec, hyprctl --batch "dispatch resizeactive exact 80% 80%; dispatch moveactive exact 10% 10%"

# Close window
bind = SUPER, q, killactive

# Toggle floating
bind = SUPER, v, togglefloating

# Move focus
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# Mouse bindings
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# === Cheatsheet (Ctrl+Alt+/) ===
bind = CTRL ALT, slash, exec, ~/.local/bin/hypr-cheatsheet

# === Screenshot ===
bind = SUPER SHIFT, 4, exec, sh -c 'grim -g "$(slurp)" "$HOME/Desktop/Screenshots/$(date +%Y%m%d_%H%M%S).png"'
bind = SUPER SHIFT, 3, exec, sh -c 'grim "$HOME/Desktop/Screenshots/$(date +%Y%m%d_%H%M%S).png"'

# === Clipboard history ===
bind = SUPER, period, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# === Screen lock ===
bind = SUPER, escape, exec, hyprlock

# === Caffeine toggle ===
bind = CTRL ALT, backslash, exec, ~/.local/bin/hypr-caffeine-toggle

# === Reload config (Ctrl+Shift+R) ===
bind = CTRL SHIFT, r, exec, hyprctl reload

# === Browser control (Ctrl+Super + H/J/K/L) ===
# Wayland security model only allows key injection to the focused window.
bind = CTRL SUPER, h, exec, wtype -k Left
bind = CTRL SUPER, l, exec, wtype -k Right
bind = CTRL SUPER, j, exec, wtype -k Next
bind = CTRL SUPER, k, exec, wtype -k Prior

# === Auto input switching via socket2 watcher ===
# hypr-input-watcher listens to socket2 active/open window events.

# Float specific windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$

# === Autostart ===
exec-once = mkdir -p ~/Desktop/Screenshots
exec-once = waybar
exec-once = mako
exec-once = fcitx5 -d --replace
exec-once = ~/.local/bin/hypr-input-watcher
exec-once = wl-paste --watch cliphist store
exec-once = hypridle
# Local overrides (machine-specific, not tracked)
source = ~/.config/hypr/local.conf
