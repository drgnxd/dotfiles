background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    color = rgb(002b36)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    outer_color = rgb(268bd2)
    inner_color = rgb(073642)
    font_color = rgb(839496)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(839496)
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
}
