# Catalog v2.3 - Improved matching, presets, ordering

load: {always: [skills_core.yaml, ja, think], max_tokens: 5000}

catalog:
  think: {path: essential/thinking_framework.yaml, order: 1, keywords: "analyze|design|compare|eval|complex|sec|migrate|arch", priority: high}
  langs: {path: essential/languages.yaml, order: 2, keywords: "nushell|python|bash|javascript|rust|\\.nu|\\.py|\\.sh|\\.js|\\.rs"}
  prac: {path: essential/practices.yaml, order: 3, keywords: "code|test|review|refactor|debug"}
  infra: {path: specialized/infrastructure.yaml, order: 4, keywords: "git|docker|linux|db|container|commit"}
  research: {path: specialized/research.yaml, order: 5, keywords: "research|study|investigation", tools: tools/research/}
  ja: {path: specialized/japanese.yaml, order: 6, keywords: "japanese|translate|translation"}

presets:
  py_dev: [think, langs, prac]
  devops: [think, infra, langs]
  research: [think, research, prac]
  sec: [think, infra, prac]
  general: [think, prac]

think_mode:
  simple: {patterns: ["^ls", "^cat", "^echo", "^pwd", "show", "list", "^get"], budget: 50}
  medium: {patterns: ["create", "write", "refactor", "fix", "update", "impl"], budget: 300}
  complex: {patterns: ["design", "arch", "migrate", "sec", "audit", "research", "compare.+vs", "eval"], budget: 750}
